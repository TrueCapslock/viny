<?xml version="1.0" encoding="utf-8"?>
<!-- Humle (Norwegian: hops). Hand-designed hop-cone motif.
     Amber palette mirrors globals.css bg-wine-gradient under [data-beer="true"].
     The beer-mode wine tokens used by the gradient stops are
     wine-700=#9a5500 and wine-950=#3b1d00.
     viewBox 100x100, scales freely via CSS className on <img>. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a5500"/>
      <stop offset="1" stop-color="#3b1d00"/>
    </linearGradient>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdeed5"/>
      <stop offset="0.5" stop-color="#f5c060"/>
      <stop offset="1" stop-color="#e08d20"/>
    </linearGradient>
    <radialGradient id="bract" cx="0.5" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#fdeed5"/>
      <stop offset="1" stop-color="#e08d20"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background, matches bg-wine-gradient under beer mode. -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Stem rising above the cone. -->
  <path d="M50,22 L50,12" stroke="#fdeed5" stroke-width="2.2"
        fill="none" stroke-linecap="round"/>

  <!-- Leaf curl. -->
  <path d="M50,16 C58,8 72,14 68,24 C62,22 54,20 50,20 Z"
        fill="url(#bract)" stroke="#fdeed5" stroke-width="1" stroke-linejoin="round"/>
  <path d="M52,16 L66,22" stroke="#fdeed5" stroke-width="0.7"
        fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Pinecone (cone) silhouette holding the bracts. -->
  <path d="M50,22
           C66,26 72,38 70,52
           C68,68 60,82 50,86
           C40,82 32,68 30,52
           C28,38 34,26 50,22 Z"
        fill="url(#cone)" stroke="#9a5500" stroke-width="2" stroke-linejoin="round"/>

  <!-- Bracts: 12 leaf-shaped scales in 5 rows (3-3-3-2-1).
       Row 2 sits inside the cone's narrower mid (avoids 4-bract crowding
       that the cone outline doesn't have room for at small icon sizes). -->
  <g fill="url(#bract)" stroke="#9a5500" stroke-width="1.1" stroke-linejoin="round">
    <!-- Row 1 (top, 3 bracts) -->
    <path d="M40,32 C40,28 46,28 46,32 C46,36 44,40 43,40 C42,40 40,36 40,32 Z"/>
    <path d="M49,30 C49,26 55,26 55,30 C55,34 53,38 52,38 C51,38 49,34 49,30 Z"/>
    <path d="M58,32 C58,28 64,28 64,32 C64,36 62,40 61,40 C60,40 58,36 58,32 Z"/>

    <!-- Row 2 (3 bracts, concrete spread matching rows 1 and 3) -->
    <path d="M34,42 C34,38 40,38 40,42 C40,46 38,50 37,50 C36,50 34,46 34,42 Z"/>
    <path d="M46,42 C46,38 52,38 52,42 C52,46 50,50 49,50 C48,50 46,46 46,42 Z"/>
    <path d="M58,42 C58,38 64,38 64,42 C64,46 62,50 61,50 C60,50 58,46 58,42 Z"/>

    <!-- Row 3 (3 bracts, narrowing inside the cone) -->
    <path d="M36,52 C36,48 42,48 42,52 C42,56 40,60 39,60 C38,60 36,56 36,52 Z"/>
    <path d="M48,52 C48,48 54,48 54,52 C54,56 52,60 51,60 C50,60 48,56 48,52 Z"/>
    <path d="M60,52 C60,48 66,48 66,52 C66,56 64,60 63,60 C62,60 60,56 60,52 Z"/>

    <!-- Row 4 (2 bracts) -->
    <path d="M40,62 C40,58 46,58 46,62 C46,66 44,70 43,70 C42,70 40,66 40,62 Z"/>
    <path d="M54,62 C54,58 60,58 60,62 C60,66 58,70 57,70 C56,70 54,66 54,62 Z"/>

    <!-- Row 5 (1 bract, tip) -->
    <path d="M47,72 C47,68 53,68 53,72 C53,76 51,80 50,80 C49,80 47,76 47,72 Z"/>
  </g>

  <!-- Specular highlights on bracts that catch the upper-left light. -->
  <g fill="#fdeed5" opacity="0.5">
    <circle cx="43" cy="30" r="1.3"/>
    <circle cx="52" cy="28" r="1.3"/>
    <circle cx="61" cy="30" r="1.3"/>
    <circle cx="37" cy="40" r="1.3"/>
    <circle cx="49" cy="40" r="1.3"/>
    <circle cx="61" cy="40" r="1.3"/>
  </g>
</svg>
